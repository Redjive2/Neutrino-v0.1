<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neutrino</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login overlay -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div class="login-logo">N</div>
      <h1 class="login-title">Neutrino</h1>
      <p class="login-subtitle">Welcome back!</p>
      <div class="login-tabs">
        <button class="login-tab active" id="tab-login">Log In</button>
        <button class="login-tab" id="tab-register">Register</button>
      </div>
      <div id="login-form">
        <input type="text" id="login-username" placeholder="Username" autocomplete="username">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
        <button class="btn-primary" id="login-btn">Log In</button>
        <div class="login-error" id="login-error"></div>
      </div>
      <div id="register-form" style="display:none">
        <input type="text" id="reg-username" placeholder="Username" autocomplete="off">
        <input type="password" id="reg-password" placeholder="Password" autocomplete="new-password">
        <button class="btn-primary" id="reg-btn">Create Account</button>
        <div class="login-error" id="reg-error"></div>
      </div>
    </div>
  </div>

  <div class="app">
    <!-- Server list sidebar -->
    <nav class="server-list">
      <div class="server-icon home" id="explore-btn" title="Explore Servers">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5.5-2.5l7.51-3.49L17.5 6.5 9.99 9.99 6.5 17.5zm5.5-6.6c.61 0 1.1.49 1.1 1.1s-.49 1.1-1.1 1.1-1.1-.49-1.1-1.1.49-1.1 1.1-1.1z"/>
        </svg>
      </div>
      <div class="server-separator"></div>
      <div id="server-icons-container"></div>
      <div class="server-separator" id="server-sep-bottom"></div>
      <div class="server-icon add-server" title="Add a Server">+</div>
    </nav>

    <!-- Channel sidebar -->
    <aside class="channel-sidebar">
      <div class="server-header" id="server-header">
        <h2 class="server-name">Neutrino</h2>
        <button class="delete-server-btn" id="delete-server-btn" title="Delete Server">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
          </svg>
        </button>
        <button class="leave-server-btn" id="leave-server-btn" style="display:none" title="Leave Server">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
          </svg>
        </button>
        <button class="dropdown-arrow" id="server-menu-btn">&#9662;</button>
        <div class="server-menu" id="server-menu">
          <button class="account-menu-item" id="invite-to-server-btn">Invite to Server</button>
          <button class="account-menu-item" id="kick-from-server-btn">Kick from Server</button>
          <div class="account-menu-sep"></div>
          <button class="account-menu-item" id="rename-server-btn">Rename Server</button>
          <button class="account-menu-item" id="change-thumbnail-btn">Change Thumbnail</button>
          <button class="account-menu-item" id="remove-thumbnail-btn">Remove Thumbnail</button>
          <button class="account-menu-item" id="toggle-visibility-btn">Make Private</button>
        </div>
      </div>
      <div class="channel-list" id="channel-list">
        <div style="padding:16px;color:var(--text-muted);font-size:13px">Select a server.</div>
      </div>
      <div class="user-panel">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <span class="username" id="current-username">—</span>
          <span class="user-status">Online</span>
        </div>
        <div class="user-controls">
          <button class="control-btn" id="account-menu-btn" title="Account Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/>
            </svg>
          </button>
        </div>
        <div class="account-menu" id="account-menu">
          <button class="account-menu-item" id="change-pfp-btn">Change Profile Picture</button>
          <button class="account-menu-item" id="change-username-btn">Change Username</button>
          <button class="account-menu-item" id="change-password-btn">Change Password</button>
          <div class="account-menu-sep"></div>
          <button class="account-menu-item" id="logout-btn">Log Out</button>
          <button class="account-menu-item danger" id="delete-account-btn">Delete Account</button>
        </div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-area">
      <header class="chat-header">
        <span class="channel-hash">/</span>
        <span class="chat-channel-name" id="chat-channel-name">—</span>
        <div class="header-divider"></div>
        <span class="channel-topic" id="channel-topic"></span>
        <div class="header-actions">
          <button class="header-btn" id="toggle-members" title="Member List">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="messages-container" id="messages-container">
        <div class="welcome-message">
          <div class="welcome-icon">N</div>
          <h1>Welcome to Neutrino</h1>
          <p>Select a server and channel to start chatting.</p>
        </div>
      </div>

      <div class="message-input-area">
        <div class="attachment-preview-strip" id="attachment-preview-strip"></div>
        <div class="input-wrapper">
          <button class="attach-btn" id="attach-btn" title="Attach file"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg></button>
          <input type="text" id="message-input" placeholder="Select a channel first" autocomplete="off" disabled>
          <div class="input-actions">
            <button class="emoji-btn" id="emoji-btn" title="Emoji"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>
          </div>
        </div>
      </div>
    </main>

    <!-- Members sidebar -->
    <aside class="members-sidebar" id="members-sidebar">
      <div class="member-category"><span>CHANNEL MEMBERS</span></div>
    </aside>

    <!-- Explore overlay (replaces channel sidebar + chat + members when open) -->
    <div class="explore-panel" id="explore-panel">
      <div class="explore-header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="opacity:.5">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5.5-2.5l7.51-3.49L17.5 6.5 9.99 9.99 6.5 17.5zm5.5-6.6c.61 0 1.1.49 1.1 1.1s-.49 1.1-1.1 1.1-1.1-.49-1.1-1.1.49-1.1 1.1-1.1z"/>
        </svg>
        <h1>Explore Servers</h1>
        <p>Browse all public servers on Neutrino</p>
      </div>
      <div class="explore-grid" id="explore-grid"></div>
    </div>
  </div>

  <!-- Emoji picker -->
  <div class="emoji-picker" id="emoji-picker">
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>

  <input type="file" id="file-input" style="display:none" accept="image/png,image/jpeg,image/gif,image/webp,video/mp4,video/webm" multiple>

  <script src="app.js"></script>
</body>
</html>
